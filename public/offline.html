<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <title>오프라인 - 패치로그</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #18181b;
        --muted: #71717a;
        --card: #f4f4f5;
        --border: #e4e4e7;
        --accent: #2563eb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #09090b;
          --fg: #fafafa;
          --muted: #a1a1aa;
          --card: #18181b;
          --border: #27272a;
          --accent: #60a5fa;
        }
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(circle at 20% 15%, rgba(37, 99, 235, 0.14), transparent 30%), var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        letter-spacing: -0.02em;
      }
      main {
        width: min(100%, 420px);
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: color-mix(in srgb, var(--card) 88%, transparent);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      }
      .mark {
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
        margin-bottom: 20px;
        border-radius: 18px;
        background: var(--fg);
        color: var(--bg);
        font-size: 30px;
        font-weight: 900;
      }
      h1 { margin: 0 0 8px; font-size: 24px; line-height: 1.2; }
      p { margin: 0; color: var(--muted); line-height: 1.6; }
      a {
        display: inline-flex;
        margin-top: 22px;
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">P</div>
      <h1>오프라인 상태입니다</h1>
      <p>이미 열어본 패치노트는 계속 볼 수 있어요. 새 패치 데이터를 보려면 인터넷 연결 후 다시 시도해 주세요.</p>
      <a href="/patch">패치 목록으로 돌아가기</a>
    </main>
  </body>
</html>
